<!DOCTYPE html>
<html lang="en">
<head>
    <style>
/* Paste the CSS code here */
:root {
    --gold: #d4af37;
    --dark-bg: #050505;
    --card-bg: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.1);
}

body {
    background-color: var(--dark-bg);
    background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.glass-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 60px 40px;
    text-align: center;
    width: 85%;
    max-width: 350px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.7);
}

h1 {
    font-weight: 200;
    letter-spacing: 10px;
    color: var(--gold);
    font-size: 1rem;
    margin: 0;
}

.time-display {
    font-size: 4.5rem;
    font-weight: 100;
    margin: 40px 0;
}

.btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 15px 0;
    width: 100%;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 0.7rem;
}
    </style>
    
</head>
<body>

    <div class="glass-card" id="mainCard">
        <h1>SYNC</h1>
        <div id="clock" class="time-display">00:00</div>
        
        <div id="controls">
            <input type="time" id="alarmTime" class="time-input" style="display:none;">
            <button class="btn" id="mainBtn" onclick="handleAction()">Initialize System</button>
        </div>
        
        <div class="status" id="statusLine">System Standby</div>
    </div>

    <audio id="alarmAudio" src="https://assets.mixkit.co/sfx/preview/mixkit-slow-morning-alarm-614.mp3" loop></audio>

    <script>
        let isController = false;

        // Clock Update Logic
        setInterval(() => {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}`;
            checkAlarm(hours, minutes);
        }, 1000);

        function handleAction() {
            const btn = document.getElementById('mainBtn');
            const input = document.getElementById('alarmTime');
            
            if(!isController) {
                isController = true;
                btn.innerText = "Set Remote Alarm";
                input.style.display = "block";
                document.getElementById('statusLine').innerText = "Controller Mode Active";
            } else {
                saveAlarm(input.value);
            }
        }

        function saveAlarm(time) {
            if(!time) return alert("Select a time first");
            localStorage.setItem('scheduledAlarm', time);
            document.getElementById('statusLine').innerText = `Sync Locked for ${time}`;
            document.getElementById('mainBtn').innerText = "Update Alarm";
        }

        function checkAlarm(h, m) {
            const scheduled = localStorage.getItem('scheduledAlarm');
            const current = `${h}:${m}`;
            
            if(scheduled === current) {
                triggerAlarm();
            }
        }

        function triggerAlarm() {
            const audio = document.getElementById('alarmAudio');
            const card = document.getElementById('mainCard');
            
            audio.play();
            card.classList.add('alarm-active');
            document.getElementById('statusLine').innerText = "WAKE UP 🧿";
            
            if (navigator.vibrate) {
                navigator.vibrate([500, 300, 500, 300, 500]);
            }
        }

        // Register Service Worker for Background Tasks
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
